            application/json:
              schema:
                $ref: '#/components/schemas/DnsRequestPage'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
    post:
      tags: [Admin]
      summary: Create a DNS request
      operationId: createAdminDnsRequest
      security:
        - AccessCookieAuth: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DnsRequestCreateRequest'
      responses:
        '201':
          description: DNS request created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DnsRequestMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/admin/dns-requests/{id}:
    get:
      tags: [Admin]
      summary: Get a DNS request by id
      operationId: getAdminDnsRequest
      security:
        - AccessCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: DNS request detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DnsRequestItemEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
    patch:
      tags: [Admin]
      summary: Update a DNS request
      operationId: updateAdminDnsRequest
      security:
        - AccessCookieAuth: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DnsRequestUpdateRequest'
      responses:
        '200':
          description: DNS request updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DnsRequestMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
    delete:
      tags: [Admin]
      summary: Delete a DNS request
      operationId: deleteAdminDnsRequest
      security:
        - AccessCookieAuth: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: DNS request removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DnsRequestMutationResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 64-character lowercase hexadecimal API key.
    AccessCookieAuth:
      type: apiKey
      in: cookie
      name: __Host-access
      description: Access-session cookie used for user and admin authentication.
    RefreshCookieAuth:
      type: apiKey
      in: cookie
      name: __Host-refresh
      description: Refresh-session cookie used to rotate sessions and derive CSRF tokens.
    CsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF token derived from the current session family.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource identifier.
    TargetPath:
      name: target
      in: path
      required: true
      schema:
        type: string
      description: DNS target identifier.
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Page size. Default 50, maximum 200.
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Zero-based page offset.
    ActiveQuery:
      name: active
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/BooleanLike'
      description: Boolean-like filter accepting 0/1 and common textual equivalents.
  responses:
    BadRequestResponse:
      description: Invalid parameters or request-specific business rule error.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidParamsError'
              - $ref: '#/components/schemas/Error'
    UnauthorizedResponse:
      description: Missing or invalid authentication credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenResponse:
      description: Access denied, CSRF validation failed, or the request is otherwise forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BannedResponse:
      description: Request rejected because the client, email, alias, or domain is banned.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BannedError'
    NotFoundResponse:
      description: Requested resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ConflictResponse:
      description: Request conflicts with an existing resource or current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimitedResponse:
      description: Request rejected by a route-group rate limit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitedError'
        text/plain:
          schema:
            type: string
    UnsupportedMediaTypeResponse:
      description: Unsupported media type.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGatewayResponse:
      description: Upstream dependency failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalErrorResponse:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailableResponse:
      description: Temporary unavailability or upstream timeout.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
      additionalProperties: true
    InvalidParamsError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            field:
              type: string
            reason:
              type: string
            hint:
              type: string
            constraints:
              type: object
              additionalProperties:
                type: string
    BannedError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            ban:
              type: object
              additionalProperties: true
            type:
              type: string
            value:
              type: string
    RateLimitedError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            where:
              type: string
            reason:
              type: string
    HtmlPage:
      type: string
    FlexibleObject:
      type: object
      additionalProperties: true
    FlexibleJsonOrString:
      oneOf:
        - type: object
          additionalProperties: true
        - type: string
    BooleanLike:
      oneOf:
        - type: boolean
        - type: integer
          enum: [0, 1]
        - type: string
          enum: ['0', '1', 'true', 'false', 'yes', 'no', 'on', 'off']
    Pagination:
      type: object
      required: [total, limit, offset]
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    OffsetPagination:
      type: object
      required: [limit, offset]
      properties:
        limit:
          type: integer
        offset:
          type: integer
    MinimalUser:
      type: object
      required: [id, username, email]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
    PublicUser:
      type: object
      required: [id, username, email, is_active, is_admin]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: integer
          enum: [0, 1]
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
    SessionInfo:
      type: object
      required: [session_family_id, access_expires_at, refresh_expires_at]
      properties:
        session_family_id:
          type: string
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
    StatsSummary:
      type: object
      required: [domains, aliases]
      properties:
        domains:
          type: integer
        aliases:
          type: integer
    ConfirmVia:
      type: object
      required: [method, path]
      properties:
        method:
          type: string
          enum: [POST]
        path:
          type: string
    ForwardSubscribeResponse:
      type: object
      required: [ok, action, alias_candidate, to, confirmation]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [subscribe]
        alias_candidate:
          type: string
        to:
          type: string
          format: email
        confirmation:
          type: object
          required: [sent, ttl_minutes]
          properties:
            sent:
              type: boolean
            ttl_minutes:
              type: integer
    ForwardUnsubscribeResponse:
      type: object
      required: [ok, action, alias, sent, ttl_minutes]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [unsubscribe]
        alias:
          type: string
        sent:
          type: boolean
        reason:
          type: string
        ttl_minutes:
          type: integer
    ForwardConfirmPreviewResponse:
      type: object
      required: [ok, pending, mutation_required, intent, confirm_via]
      properties:
        ok:
          type: boolean
        pending:
          type: boolean
        mutation_required:
          type: boolean
        intent:
          type: string
          enum: [subscribe, unsubscribe]
        address:
          type: string
        goto:
          type: string
        confirm_via:
          $ref: '#/components/schemas/ConfirmVia'
    ForwardConfirmResponse:
      type: object
      required: [ok, confirmed, intent, address]
      properties:
        ok:
          type: boolean
        confirmed:
          type: boolean
        intent:
          type: string
          enum: [subscribe, unsubscribe]
        created:
          type: boolean
        removed:
          type: boolean
        reason:
          type: string
        address:
          type: string
        goto:
          type: string
    TargetRequest:
      type: object
      required: [target]
      properties:
        target:
          type: string
    TokenBody:
      type: object
      required: [token]
      properties:
        token:
          type: string
    CredentialsCreateRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        days:
          type: integer
          minimum: 1
          maximum: 90
    CredentialsCreateConfirmation:
      type: object
      required: [sent, ttl_minutes]
      properties:
        sent:
          type: boolean
        ttl_minutes:
          type: integer
        reason:
          type: string
        status:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_sent_at:
          type: string
          format: date-time
          nullable: true
        next_allowed_send_at:
          type: string
          format: date-time
          nullable: true
        send_count:
          type: integer
        remaining_attempts:
          type: integer
    CredentialsCreateResponse:
      type: object
      required: [ok, action, email, confirmation]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [api_credentials_create]
        email:
          type: string
          format: email
        days:
          type: integer
        confirmation:
          $ref: '#/components/schemas/CredentialsCreateConfirmation'
    CredentialsConfirmPreviewResponse:
      type: object
      required: [ok, pending, mutation_required, email, days, confirm_via]
      properties:
        ok:
          type: boolean
        pending:
          type: boolean
        mutation_required:
          type: boolean
        email:
          type: string
          format: email
        days:
          type: integer
        confirm_via:
          $ref: '#/components/schemas/ConfirmVia'
    CredentialsConfirmResponse:
      type: object
      required: [ok, action, confirmed, email, token, token_type]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [api_credentials_confirm]
        confirmed:
          type: boolean
        email:
          type: string
          format: email
        token:
          type: string
        token_type:
          type: string
          enum: [api_key]
        expires_in_days:
          type: integer
    AliasRow:
      type: object
      required: [id, address, goto, active, created, modified]
      properties:
        id:
          type: integer
        address:
          type: string
        goto:
          type: string
        active:
          type: integer
          enum: [0, 1]
        domain_id:
          type: integer
          nullable: true
        created:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time
    AliasCreateRequest:
      type: object
      required: [alias_handle, alias_domain]
      properties:
        alias_handle:
          type: string
        alias_domain:
          type: string
    AliasDeleteRequest:
      type: object
      required: [alias]
      properties:
        alias:
          type: string
    AliasListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AliasRow'
        pagination:
          $ref: '#/components/schemas/Pagination'
    AliasStatsByDomain:
      type: object
      required: [domain, total, active]
      properties:
        domain:
          type: string
        total:
          type: integer
        active:
          type: integer
    AliasStatsResponse:
      type: object
      required: [totals, active, created_last_7d, modified_last_24h, by_domain]
      properties:
        totals:
          type: integer
        active:
          type: integer
        created_last_7d:
          type: integer
        modified_last_24h:
          type: integer
        by_domain:
          type: array
          items:
            $ref: '#/components/schemas/AliasStatsByDomain'
    ActivityItem:
      type: object
      required: [type, occurred_at]
      properties:
        type:
          type: string
        occurred_at:
          type: string
          format: date-time
        route:
          type: string
          nullable: true
        intent:
          type: string
          nullable: true
        alias:
          type: string
          nullable: true
    ActivityListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivityItem'
        pagination:
          $ref: '#/components/schemas/OffsetPagination'
    SignUpRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 1
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 128
    SignUpResponse:
      type: object
      required: [ok, action, accepted]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [sign_up]
        accepted:
          type: boolean
    VerifyEmailResponse:
      type: object
      required: [ok, action, verified, user]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [verify_email]
        verified:
          type: boolean
        user:
          $ref: '#/components/schemas/MinimalUser'
    SignInRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 128
    SignInResponse:
      type: object
      required: [ok, action, authenticated, user, session]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [sign_in]
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/PublicUser'
        session:
          $ref: '#/components/schemas/SessionInfo'
    SessionResponse:
      type: object
      required: [ok, authenticated, user, session]
      properties:
        ok:
          type: boolean
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/PublicUser'
        session:
          $ref: '#/components/schemas/SessionInfo'
    CsrfResponse:
      type: object
      required: [ok, csrf_token]
      properties:
        ok:
          type: boolean
        csrf_token:
          type: string
    RefreshResponse:
      type: object
      required: [ok, action, refreshed, session]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [refresh]
        refreshed:
          type: boolean
        session:
          $ref: '#/components/schemas/SessionInfo'
    SignOutResponse:
      type: object
      required: [ok, action, signed_out]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [sign_out]
        signed_out:
          type: boolean
    SignOutAllResponse:
      type: object
      required: [ok, action, signed_out_all, sessions_revoked]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [sign_out_all]
        signed_out_all:
          type: boolean
        sessions_revoked:
          type: integer
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ForgotPasswordResponse:
      type: object
      required: [ok, action, accepted, recovery]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [forgot_password]
        accepted:
          type: boolean
        recovery:
          type: object
          required: [ttl_minutes]
          properties:
            ttl_minutes:
              type: integer
    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 128
    ResetPasswordResponse:
      type: object
      required: [ok, action, updated, reauth_required, sessions_revoked, user]
      properties:
        ok:
          type: boolean
        action:
          type: string
          enum: [reset_password]
        updated:
          type: boolean
        reauth_required:
          type: boolean
        sessions_revoked:
          type: integer
        user:
          $ref: '#/components/schemas/MinimalUser'
    AdminMeResponse:
      type: object
      required: [ok, authenticated, admin, session]
      properties:
        ok:
          type: boolean
        authenticated:
          type: boolean
        admin:
          $ref: '#/components/schemas/PublicUser'
        session:
          $ref: '#/components/schemas/SessionInfo'
    ProtectedMessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    Domain:
      type: object
      required: [id, name, active]
      properties:
        id:
          type: integer
        name:
          type: string
        active:
          type: integer
          enum: [0, 1]
    DomainCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        active:
          $ref: '#/components/schemas/BooleanLike'
    DomainUpdateRequest:
      type: object
      properties:
        name:
          type: string
        active:
          $ref: '#/components/schemas/BooleanLike'
    DomainPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Domain'
        pagination:
          $ref: '#/components/schemas/Pagination'
    DomainItemEnvelope:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/Domain'
    DomainMutationResponse:
      type: object
      required: [ok, item]
      properties:
        ok:
          type: boolean
        created:
          type: boolean
        updated:
          type: boolean
        deleted:
          type: boolean
        item:
          $ref: '#/components/schemas/Domain'
    AdminAliasCreateRequest:
      type: object
      required: [address, goto]
      properties:
        address:
          type: string
        goto:
          type: string
        active:
          $ref: '#/components/schemas/BooleanLike'
    AdminAliasUpdateRequest:
      type: object
      properties:
        address:
          type: string
        goto:
          type: string
        active:
          $ref: '#/components/schemas/BooleanLike'
    AdminAliasPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AliasRow'
        pagination:
          $ref: '#/components/schemas/Pagination'
    AdminAliasItemEnvelope:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/AliasRow'
    AdminAliasMutationResponse:
      type: object
      required: [ok, item]
      properties:
        ok:
          type: boolean
        created:
          type: boolean
        updated:
          type: boolean
        deleted:
          type: boolean
        item:
          $ref: '#/components/schemas/AliasRow'
    Handle:
      type: object
      required: [id, handle, address, active]
      properties:
        id:
          type: integer
        handle:
          type: string
        address:
          type: string
        active:
          type: integer
          enum: [0, 1]
    HandleCreateRequest:
      type: object
      required: [handle, address]
      properties:
        handle:
          type: string
        address:
          type: string
        active:
          $ref: '#/components/schemas/BooleanLike'
    HandleUpdateRequest:
      type: object
      properties:
        handle:
          type: string
        address:
          type: string
        active:
          $ref: '#/components/schemas/BooleanLike'
    HandlePage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Handle'
        pagination:
          $ref: '#/components/schemas/Pagination'
    HandleItemEnvelope:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/Handle'
    HandleMutationResponse:
      type: object
      required: [ok, item]
      properties:
        ok:
          type: boolean
        created:
          type: boolean
        updated:
          type: boolean
        deleted:
          type: boolean
        item:
          $ref: '#/components/schemas/Handle'
    Ban:
      type: object
      required: [id, ban_type, ban_value, created_at, active]
      properties:
        id:
          type: integer
        ban_type:
          type: string
          enum: [email, domain, ip, name]
        ban_value:
          type: string
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revoked_reason:
          type: string
          nullable: true
        active:
          type: boolean
    BanCreateRequest:
      type: object
      required: [ban_type, ban_value]
      properties:
        ban_type:
          type: string
