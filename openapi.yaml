openapi: 3.0.3
info:
  title: DocumentationAI API
  version: 1.0.0
  description: |
    OpenAPI contract derived from API_DOCS.md for the current NestJS API.
    All routes are published under /api.
    GET /api/forward/confirm and GET /api/credentials/confirm can return HTML previews when Accept: text/html.
    POST /api/credentials/confirm can also return HTML on successful confirmation when Accept: text/html.
servers:
  - url: https://mail.haltman.io
    description: Production
tags:
  - name: Public
    description: Public read-only endpoints and compatibility mirrors.
  - name: Forwarding
    description: Email-confirmed alias creation and removal flow.
  - name: Check DNS
    description: Upstream DNS request proxy endpoints.
  - name: API Credentials
    description: API key issuance and confirmation flow.
  - name: Alias API
    description: API-key authenticated alias automation routes.
  - name: Auth
    description: Cookie-based authentication, session management, and password recovery.
  - name: Admin
    description: Admin-only CRUD and operational endpoints. Access cookie is required for all routes, and admin mutations also require X-CSRF-Token.
paths:
  /api/stats:
    get:
      tags: [Public]
      summary: Get aggregate platform counters
      operationId: getStats
      responses:
        '200':
          description: Aggregated counters.
          headers:
            Cache-Control:
              description: Returned on cache miss as public, max-age=60.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsSummary'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/api/stats:
    get:
      tags: [Public]
      summary: Get aggregate platform counters (compatibility mirror)
      operationId: getStatsCompatibility
      responses:
        '200':
          description: Aggregated counters.
          headers:
            Cache-Control:
              description: Returned on cache miss as public, max-age=60.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsSummary'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/domains:
    get:
      tags: [Public]
      summary: List active managed domains
      operationId: listDomains
      responses:
        '200':
          description: Active managed domains.
          headers:
            Cache-Control:
              description: Returned on cache miss as public, max-age=10.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '403':
          $ref: '#/components/responses/BannedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/api/domains:
    get:
      tags: [Public]
      summary: List active managed domains (compatibility mirror)
      operationId: listDomainsCompatibility
      responses:
        '200':
          description: Active managed domains.
          headers:
            Cache-Control:
              description: Returned on cache miss as public, max-age=10.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '403':
          $ref: '#/components/responses/BannedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/forward/subscribe:
    get:
      tags: [Forwarding]
      summary: Request alias creation confirmation email
      operationId: requestForwardSubscribe
      description: Use address plus to, or name plus to with optional domain.
      parameters:
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: email
          description: Destination email address.
        - name: address
          in: query
          required: false
          schema:
            type: string
          description: Full alias address. Cannot be combined with name or domain.
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Alias local-part used when address is omitted.
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: Alias domain. Defaults to DEFAULT_ALIAS_DOMAIN when omitted.
      responses:
        '200':
          description: Confirmation email scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardSubscribeResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/forward/unsubscribe:
    get:
      tags: [Forwarding]
      summary: Request alias removal confirmation email
      operationId: requestForwardUnsubscribe
      parameters:
        - name: alias
          in: query
          required: true
          schema:
            type: string
          description: Full alias address.
      responses:
        '200':
          description: Confirmation email scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardUnsubscribeResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/forward/confirm:
    get:
      tags: [Forwarding]
      summary: Preview pending forwarding confirmation
      operationId: previewForwardConfirmation
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending confirmation preview. Can render JSON or HTML depending on Accept.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardConfirmPreviewResponse'
            text/html:
              schema:
                $ref: '#/components/schemas/HtmlPage'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    post:
      tags: [Forwarding]
      summary: Confirm alias creation or removal
      operationId: confirmForwardMutation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBody'
      responses:
        '200':
          description: Confirmation applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardConfirmResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/request/ui:
    post:
      tags: [Check DNS]
      summary: Create a UI DNS request
      operationId: createUiDnsRequest
      description: Proxies the request to the upstream check-dns service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetRequest'
      responses:
        '200':
          description: Upstream response payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleObject'
        '202':
          description: Upstream accepted the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleObject'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '415':
          $ref: '#/components/responses/UnsupportedMediaTypeResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '502':
          $ref: '#/components/responses/BadGatewayResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/request/email:
    post:
      tags: [Check DNS]
      summary: Create an email DNS request
      operationId: createEmailDnsRequest
      description: Same contract as /api/request/ui, but creates an EMAIL request upstream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetRequest'
      responses:
        '200':
          description: Upstream response payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleObject'
        '202':
          description: Upstream accepted the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleObject'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '415':
          $ref: '#/components/responses/UnsupportedMediaTypeResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '502':
          $ref: '#/components/responses/BadGatewayResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/checkdns/{target}:
    get:
      tags: [Check DNS]
      summary: Fetch DNS status or results for a target
      operationId: getDnsStatus
      parameters:
        - $ref: '#/components/parameters/TargetPath'
      responses:
        '200':
          description: Upstream response payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleObject'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '502':
          $ref: '#/components/responses/BadGatewayResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/credentials/create:
    post:
      tags: [API Credentials]
      summary: Request API key creation confirmation
      operationId: createApiCredentialsRequest
      description: Accepts JSON body or query string. When both are present, the body takes precedence.
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 90
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsCreateRequest'
      responses:
        '200':
          description: Confirmation flow started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '403':
          $ref: '#/components/responses/BannedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailableResponse'
  /api/credentials/confirm:
    get:
      tags: [API Credentials]
      summary: Preview pending API key confirmation
      operationId: previewApiCredentialConfirmation
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending confirmation preview. Can render JSON or HTML depending on Accept.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsConfirmPreviewResponse'
            text/html:
              schema:
                $ref: '#/components/schemas/HtmlPage'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
    post:
      tags: [API Credentials]
      summary: Confirm API key issuance
      operationId: confirmApiCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBody'
      responses:
        '200':
          description: API key issued. Can return HTML on successful confirmation when Accept is text/html.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsConfirmResponse'
            text/html:
              schema:
                $ref: '#/components/schemas/HtmlPage'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/alias/list:
    get:
      tags: [Alias API]
      summary: List aliases owned by the API key
      operationId: listOwnedAliases
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Paginated alias list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliasListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/alias/stats:
    get:
      tags: [Alias API]
      summary: Get aggregate alias statistics for the API key owner
      operationId: getAliasStats
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Alias statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliasStatsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/activity:
    get:
      tags: [Alias API]
      summary: List alias and confirmation activity
      operationId: listAliasActivity
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Activity events with offset-based pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/alias/create:
    post:
      tags: [Alias API]
      summary: Create an alias for the API key owner
      operationId: createOwnedAlias
      security:
        - ApiKeyAuth: []
      description: Accepts JSON body or query string. When both are present, the body takes precedence.
      parameters:
        - name: alias_handle
          in: query
          required: false
          schema:
            type: string
        - name: alias_domain
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AliasCreateRequest'
      responses:
        '200':
          description: Alias created.
          content:
            application/json:
              schema:
                type: object
                required: [ok, created, address, goto]
                properties:
                  ok:
                    type: boolean
                  created:
                    type: boolean
                  address:
                    type: string
                  goto:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '409':
          $ref: '#/components/responses/ConflictResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/alias/delete:
    post:
      tags: [Alias API]
      summary: Delete an alias owned by the API key
      operationId: deleteOwnedAlias
      security:
        - ApiKeyAuth: []
      description: Accepts JSON body or query string. When both are present, the body takes precedence.
      parameters:
        - name: alias
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AliasDeleteRequest'
      responses:
        '200':
          description: Alias deleted.
          content:
            application/json:
              schema:
                type: object
                required: [ok, deleted, alias]
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: boolean
                  alias:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'
  /api/auth/sign-up:
    post:
      tags: [Auth]
      summary: Create an account and trigger email verification
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '202':
          description: Sign-up accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignUpResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/auth/verify-email:
    post:
      tags: [Auth]
      summary: Confirm a user's email address
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenBody'
      responses:
        '200':
          description: Email verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/auth/sign-in:
    post:
      tags: [Auth]
      summary: Authenticate and issue session cookies
      operationId: signIn
      description: Sets __Host-access and __Host-refresh cookies on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/auth/session:
    get:
      tags: [Auth]
      summary: Resolve the current access session
      operationId: getCurrentSession
      security:
        - AccessCookieAuth: []
      responses:
        '200':
          description: Current session information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/auth/csrf:
    get:
      tags: [Auth]
      summary: Get a CSRF token for the current session family
      operationId: getCsrfToken
      security:
        - AccessCookieAuth: []
        - RefreshCookieAuth: []
      responses:
        '200':
          description: CSRF token for stateful mutation routes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate the refresh token and issue a new access token
      operationId: refreshSession
      security:
        - RefreshCookieAuth: []
          CsrfToken: []
      responses:
        '200':
          description: Session refreshed and cookies rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/auth/sign-out:
    post:
      tags: [Auth]
      summary: Revoke the current session family and clear cookies
      operationId: signOut
      security:
        - AccessCookieAuth: []
          CsrfToken: []
      description: Idempotent. If no valid session exists, the route still returns 200 and clears cookies.
      responses:
        '200':
          description: Session family signed out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignOutResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/auth/sign-out-all:
    post:
      tags: [Auth]
      summary: Revoke all sessions for the current user and clear cookies
      operationId: signOutAll
      security:
        - AccessCookieAuth: []
          CsrfToken: []
      description: Idempotent. If no valid session exists, the route still returns 200 and clears cookies.
      responses:
        '200':
          description: All sessions revoked for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignOutAllResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Start the password reset flow
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Recovery flow accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Consume a password reset token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated and active sessions revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/admin/me:
    get:
      tags: [Admin]
      summary: Get the authenticated admin and current session
      operationId: getAdminMe
      security:
        - AccessCookieAuth: []
      responses:
        '200':
          description: Authenticated admin session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/admin/protected:
    get:
      tags: [Admin]
      summary: Smoke route to validate admin access
      operationId: getAdminProtected
      security:
        - AccessCookieAuth: []
      responses:
        '200':
          description: Admin access confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectedMessageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
  /api/admin/domains:
    get:
      tags: [Admin]
      summary: List domains
      operationId: listAdminDomains
      security:
        - AccessCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/ActiveQuery'
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Paginated domain list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainPage'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '429':
          $ref: '#/components/responses/RateLimitedResponse'
    post:
      tags: [Admin]
      summary: Create a domain
      operationId: createAdminDomain
      security:
        - AccessCookieAuth: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainCreateRequest'
      responses:
